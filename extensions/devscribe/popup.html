<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevScribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; min-height: 200px;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.015) 1px, rgba(255,255,255,0.015) 2px),
        linear-gradient(180deg, #1e2236 0%, #0e1020 100%);
      color: #e0e0f0;
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
      padding: 16px;
    }
    h1 {
      font-size: 18px; font-weight: 800; margin-bottom: 2px; letter-spacing: -0.3px;
      background: linear-gradient(180deg, #fff8dc 0%, #ffd700 40%, #b8860b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.7)) drop-shadow(0 0 6px rgba(255,215,0,0.3));
    }
    .subtitle {
      font-size: 11px; color: #555570; margin-bottom: 16px; font-weight: 500;
    }
    .status-bar {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.01) 1px, rgba(255,255,255,0.01) 2px),
        linear-gradient(180deg, #0a0c16 0%, #121520 100%);
      border: 1px solid rgba(255,215,0,0.12);
      border-radius: 14px; margin-bottom: 16px; font-size: 13px; font-weight: 500;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.7), inset 0 1px 3px rgba(0,0,0,0.5);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2d40; flex-shrink: 0; }
    .status-dot.connected { background: #57d39b; box-shadow: 0 0 8px rgba(87,211,155,0.4); }
    .status-dot.disconnected { background: #f07178; }
    .note-count {
      text-align: center; padding: 16px;
      background: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.012) 1px, rgba(255,255,255,0.012) 2px),
        linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.08) 100%), #181b2a;
      border: 1px solid rgba(255,215,0,0.18);
      border-radius: 18px; margin-bottom: 16px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.3);
    }
    .note-count .number {
      font-size: 36px; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(180deg, #fff8dc 0%, #ffd700 40%, #b8860b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 10px rgba(255,215,0,0.35));
    }
    .note-count .label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 2px;
      background: linear-gradient(180deg, #c0c0d8 0%, #8080a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      min-height: 40px; padding: 10px 14px;
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 999px; cursor: pointer;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(255,255,255,0.015) 1px, rgba(255,255,255,0.015) 2px),
        linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(0,0,0,0.12) 100%), #1e2138;
      color: #c0c0d8;
      font-family: 'Manrope', -apple-system, system-ui, sans-serif;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,215,0,0.4);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 12px rgba(255,215,0,0.15);
    }
    .btn:active { transform: translateY(1px) scale(0.985); }
    .btn-icon { font-size: 16px; width: 20px; text-align: center; }
    .footer {
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid; border-image: linear-gradient(90deg, transparent 0%, rgba(255,215,0,0.2) 50%, transparent 100%) 1;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a {
      font-size: 12px; text-decoration: none; font-weight: 500;
      background: linear-gradient(180deg, #fff8dc 0%, #daa520 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .footer a:hover { text-decoration: underline; }
    .version { font-size: 11px; color: #444460; }
  </style>
</head>
<body>
  <h1>DevScribe</h1>
  <p class="subtitle">clawREFORM development companion</p>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Checking dashboard</span>
  </div>

  <div class="note-count">
    <div class="number" id="noteCount">0</div>
    <div class="label">saved notes</div>
  </div>

  <div class="actions">
    <button class="btn" id="btnNewNote">
      <span class="btn-icon">+</span> New Note
    </button>
    <button class="btn" id="btnElementSelect">
      <span class="btn-icon">◎</span> Element Select
    </button>
    <button class="btn" id="btnExport">
      <span class="btn-icon">↓</span> Export Notes
    </button>
  </div>

  <div class="footer">
    <a href="#" id="optionsLink">Settings</a>
    <span class="version">v0.1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
